<script>
const indexHTML = `<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Community Events</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, sans-serif; background: #f9f9f7; color: #1a1a1a; padding: 2rem 1rem; }
  .container { max-width: 700px; margin: 0 auto; }
  h1 { font-size: 24px; font-weight: 600; margin-bottom: 0.25rem; }
  .subtitle { font-size: 14px; color: #666; margin-bottom: 1.5rem; }
  .subtitle a { color: #185FA5; }
  .controls { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 1rem; }
  .controls input, .controls select { flex: 1; min-width: 140px; padding: 8px 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 13px; background: #fff; }
  .count { font-size: 13px; color: #666; margin-bottom: 0.75rem; }
  .event-list { display: flex; flex-direction: column; gap: 10px; }
  .event-card { background: #fff; border: 1px solid #e8e8e8; border-radius: 12px; padding: 1rem 1.25rem; }
  .event-card:hover { border-color: #ccc; }
  .event-title { font-weight: 600; font-size: 15px; margin-bottom: 2px; }
  .event-org { font-size: 13px; color: #185FA5; margin-bottom: 6px; }
  .event-meta { font-size: 13px; color: #666; display: flex; flex-wrap: wrap; gap: 12px; }
  .event-desc { font-size: 13px; color: #555; margin-top: 8px; line-height: 1.5; }
  .event-footer { margin-top: 10px; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .tag { display: inline-block; font-size: 11px; padding: 2px 8px; border-radius: 99px; background: #f1f1ef; color: #555; border: 1px solid #e0e0dc; }
  .event-link { font-size: 13px; color: #185FA5; text-decoration: none; }
  .empty { text-align: center; color: #888; font-size: 14px; padding: 2rem 0; }
</style>
</head>
<body>
<div class="container">
  <h1>Community Events</h1>
  <p class="subtitle">Approved upcoming events. <a href="submit.html">Submit an event &rarr;</a></p>
  <div class="controls">
    <input type="text" id="search" placeholder="Search events..." oninput="render()" />
    <select id="sort" onchange="render()">
      <option value="date">Sort by date</option>
      <option value="org">Sort by organization</option>
      <option value="name">Sort by name</option>
    </select>
    <select id="filter-org" onchange="render()">
      <option value="">All organizations</option>
    </select>
    <select id="filter-month" onchange="render()">
      <option value="">All months</option>
      <option value="0">January</option><option value="1">February</option><option value="2">March</option>
      <option value="3">April</option><option value="4">May</option><option value="5">June</option>
      <option value="6">July</option><option value="7">August</option><option value="8">September</option>
      <option value="9">October</option><option value="10">November</option><option value="11">December</option>
    </select>
  </div>
  <div class="count" id="count"></div>
  <div class="event-list" id="list"></div>
</div>
<script>
const DAYS = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const WEEK_LABELS = ['','first','second','third','fourth','last'];

/* =====================================================
   EVENTS DATA — add approved events here
   Each event object fields:
     name        : string
     org         : string
     desc        : string
     location    : string
     url         : string (optional)
     recurrence  : 'weekly' | 'monthly-day' | 'monthly-date' | 'once'
     weekly_day        : 0-6 (Sun-Sat) — for weekly
     monthly_week      : 1-4 or 'last' — for monthly-day
     monthly_weekday   : 0-6 (Sun-Sat) — for monthly-day
     monthly_date      : 1-31 — for monthly-date
     one_time_date     : 'YYYY-MM-DD' — for once
     start_time  : 'HH:MM' (24h)
     end_time    : 'HH:MM' (24h, optional)
===================================================== */
const events = [
  {
    name: "Community Lunch & Learn",
    org: "Downtown Rotary Club",
    desc: "Monthly networking lunch open to all community members. Guest speakers on local topics.",
    location: "City Hall, Room 2",
    url: "https://example.com",
    recurrence: "monthly-day",
    monthly_week: 1,
    monthly_weekday: 3,
    start_time: "11:30",
    end_time: "13:00"
  }
];

function formatTime(t) {
  if (!t) return '';
  const [h, m] = t.split(':').map(Number);
  const ampm = h >= 12 ? 'PM' : 'AM';
  return h % 12 || 12 + ':' + String(m).padStart(2,'0') + ' ' + ampm;
}

function recurrenceLabel(ev) {
  if (ev.recurrence === 'weekly') return 'Every ' + DAYS[ev.weekly_day];
  if (ev.recurrence === 'monthly-day') {
    const w = WEEK_LABELS[ev.monthly_week];
    return w.charAt(0).toUpperCase() + w.slice(1) + ' ' + DAYS[ev.monthly_weekday] + ' of the month';
  }
  if (ev.recurrence === 'monthly-date') {
    const d = ev.monthly_date;
    const s = ['th','st','nd','rd'][Math.min(d%10,3)] || 'th';
    return 'Monthly on the ' + d + s;
  }
  return 'One-time event';
}

function nextOccurrence(ev) {
  const now = new Date();
  if (ev.recurrence === 'once') return new Date(ev.one_time_date);
  if (ev.recurrence === 'weekly') {
    const d = new Date(now);
    const diff = (ev.weekly_day - d.getDay() + 7) % 7 || 7;
    d.setDate(d.getDate() + diff);
    return d;
  }
  if (ev.recurrence === 'monthly-day') {
    for (let mo = 0; mo < 3; mo++) {
      const base = new Date(now.getFullYear(), now.getMonth() + mo, 1);
      let count = 0;
      for (let day = 1; day <= 31; day++) {
        const td = new Date(base.getFullYear(), base.getMonth(), day);
        if (td.getMonth() !== base.getMonth()) break;
        if (td.getDay() === ev.monthly_weekday) {
          count++;
          if (count === ev.monthly_week && td > now) return td;
        }
      }
    }
  }
  if (ev.recurrence === 'monthly-date') {
    for (let mo = 0; mo < 3; mo++) {
      const td = new Date(now.getFullYear(), now.getMonth() + mo, ev.monthly_date);
      if (td > now) return td;
    }
  }
  return now;
}

function render() {
  const search = document.getElementById('search').value.toLowerCase();
  const sort = document.getElementById('sort').value;
  const filterOrg = document.getElementById('filter-org').value;
  const filterMonth = document.getElementById('filter-month').value;

  let filtered = events.filter(ev => {
    const text = (ev.name + ev.org + ev.desc + ev.location).toLowerCase();
    if (search && !text.includes(search)) return false;
    if (filterOrg && ev.org !== filterOrg) return false;
    if (filterMonth !== '' && nextOccurrence(ev).getMonth() !== parseInt(filterMonth)) return false;
    return true;
  });

  filtered.sort((a, b) => {
    let va, vb;
    if (sort === 'date') { va = nextOccurrence(a).getTime(); vb = nextOccurrence(b).getTime(); }
    else if (sort === 'org') { va = a.org.toLowerCase(); vb = b.org.toLowerCase(); }
    else { va = a.name.toLowerCase(); vb = b.name.toLowerCase(); }
    return va < vb ? -1 : va > vb ? 1 : 0;
  });

  document.getElementById('count').textContent = filtered.length + ' event' + (filtered.length !== 1 ? 's' : '') + ' found';

  const list = document.getElementById('list');
  if (!filtered.length) { list.innerHTML = '<p class="empty">No events match your filters.</p>'; return; }

  list.innerHTML = filtered.map(ev => {
    const next = nextOccurrence(ev);
    const dateStr = DAYS[next.getDay()] + ', ' + MONTHS[next.getMonth()] + ' ' + next.getDate();
    const h = parseInt(ev.start_time), m = ev.start_time.split(':')[1];
    const ampm = h >= 12 ? 'PM' : 'AM';
    const timeStr = (h % 12 || 12) + ':' + m + ' ' + ampm + (ev.end_time ? ' \u2013 ' + formatTime(ev.end_time) : '');
    return '<div class="event-card"><p class="event-title">' + ev.name + '</p><p class="event-org">' + ev.org + '</p>' +
      '<div class="event-meta"><span>Next: ' + dateStr + '</span><span>' + timeStr + '</span><span>' + ev.location + '</span></div>' +
      '<p class="event-desc">' + ev.desc + '</p>' +
      '<div class="event-footer"><span class="tag">' + recurrenceLabel(ev) + '</span>' +
      (ev.url ? '<a class="event-link" href="' + ev.url + '" target="_blank">Event details &rarr;</a>' : '') +
      '</div></div>';
  }).join('');
}

const orgs = [...new Set(events.map(e => e.org))].sort();
const sel = document.getElementById('filter-org');
orgs.forEach(o => { const opt = document.createElement('option'); opt.value = o; opt.textContent = o; sel.appendChild(opt); });
render();
<\/script>
</body>
</html>`;

const submitHTML = `<!DOCTYPE html>
<html lang="en">
<head>

<title>Submit a Community Event</title>
<style>

  body { font-family: system-ui, sans-serif; background: #f9f9f7; color: #1a1a1a; padding: 2rem 1rem; }
  .container { max-width: 640px; margin: 0 auto; }
  h1 { font-size: 24px; font-weight: 600; margin-bottom: 0.25rem; }
  .subtitle { font-size: 14px; color: #666; margin-bottom: 1.5rem; }
  .form-section { margin-bottom: 1.25rem; }
  label { display: block; font-size: 13px; color: #555; font-weight: 500; margin-bottom: 5px; }
  input, select, textarea {

<body>
<div class="container">
  <a href="index.html" class="back-link">&larr; Back to events</a>

    </div>

    <div class="form-section">
      <label for="organization">Organizing group or organization</label>

    </div>

    <div class="form-section">
      <label for="description">Description</label>
      <textarea id="description" name="description" placeholder="What is this event about? Who should attend?" required></textarea>
    </div>

    <div class="form-section">
      <label for="location">Location / address</label>

          <span>The</span>

          <select name="monthly_weekday">
            <option value="1">Monday</option><option value="2">Tuesday</option><option value="3">Wednesday</option>
            <option value="4">Thursday</option><option value="5">Friday</option><option value="6">Saturday</option><option value="0">Sunday</option>

  });
}
<\/script>
</body>
</html>`;

function download(filename, content) {
  const blob = new Blob([content], { type: 'text/html' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = filename;
  a.click();
}

function downloadIndex() { download('index.html', indexHTML); }
function downloadSubmit() { download('submit.html', submitHTML); }
</script>
